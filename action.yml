name: Validate WinGet DSC Packages (REST)
description: Validate Microsoft.WinGet.DSC WinGetPackage IDs using WinGet REST API (no winget.exe)

inputs:
  dscfile:
    description: Path to DSC YAML file
    required: true

runs:
  using: composite
  steps:
    - name: Validate WinGet packages via REST
      shell: pwsh
      run: |
        & (Join-Path $env:GITHUB_ACTION_PATH 'scripts/validate-winget-dsc-api.ps1') -DscFile "${{ inputs.dscfile }}"