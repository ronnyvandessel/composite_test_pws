name: Validate WinGet DSC Packages
description: Validate Microsoft.WinGet.DSC/WinGetPackage resources in a DSC YAML file

inputs:
  dscfile:
    description: Path to the DSC YAML configuration file
    required: true

runs:
  using: composite
   steps:
    - name: Checkout winget-pkgs repository
        uses: actions/checkout@v4
         with:
         repository: microsoft/winget-pkgs
          path: winget-pkgs

    - name: Validate WinGet packages in DSC
      shell: pwsh
      run: |
        # $script = Join-Path $env:GITHUB_ACTION_PATH 'scripts/validate-winget-dsc.ps1'
        # & $script  -DscFile "${{ inputs.dscfile }}"  -WingetRepoRoot "winget-pkgs"
        
          & (Join-Path $env:GITHUB_ACTION_PATH 'scripts/validate-winget-dsc-direct.ps1') -DscFile "${{ inputs.dscfile }}"
